        // Render Popular Walks
        function renderPopularWalks() {
            const walksGrid = document.getElementById('walksGrid');
            
            walksGrid.innerHTML = popularWalksData.map(walk => `
                <div class="walk-card-item" data-walk-id="${walk.id}">
                    <div class="walk-card-image">
                        <img src="${walk.imageUrl}" alt="${walk.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="walk-card-fallback" style="display:none;">🏞️</div>
                    </div>
                    <div class="walk-card-content">
                        <h3 class="walk-card-title">${walk.title}</h3>
                        <p class="walk-card-description">${walk.description}</p>
                        <div class="walk-card-meta">
                            <div class="walk-card-meta-item">
                                <span>${walk.distance}</span>
                            </div>
                            <div class="walk-card-meta-item">
                                <span>${walk.duration}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
